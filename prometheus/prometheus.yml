global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the .NET monitoring API
  - job_name: "monitoring-api"
    static_configs:
      - targets: ["monitoring-api:8080"]

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter — database host CPU/RAM metrics
  # node_exporter shares postgres's network namespace, so it's reachable at postgres:9100.
  - job_name: "node"
    static_configs:
      - targets: ["postgres:9100"]
