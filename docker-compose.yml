services:
  monitoring-api:
    build:
      context: .
      dockerfile: Monitoring.Api/Dockerfile
    container_name: monitoring-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Host=postgres resolves to the postgres service inside the Docker network.
      # $$ is Docker Compose escape for a literal $ in the password.
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=NAPA_Interview;Username=interview_user;Password=ihnte$$*(&)%Yhjn9y53"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - monitoring-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: NAPA_Interview
      POSTGRES_USER: interview_user
      # $$ → literal $ passed to the container
      POSTGRES_PASSWORD: "ihnte$$*(&)%Yhjn9y53"
    # Preload pg_stat_statements so the extension can be created in init.sql
    command: postgres -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_user -d NAPA_Interview"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  postgres_data:
