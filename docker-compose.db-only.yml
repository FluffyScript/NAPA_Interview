# Spins up only PostgreSQL — use this when running the API locally with `dotnet run`.
# The API's appsettings.json already points to Host=localhost:5432, so no env override needed.
#
# Usage:
#   docker compose -f docker-compose.db-only.yml up -d
#   docker compose -f docker-compose.db-only.yml down

services:
  postgres:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: NAPA_Interview
      POSTGRES_USER: interview_user
      POSTGRES_PASSWORD: "ihnte$$*(&)%Yhjn9y53"
    command: postgres -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_user -d NAPA_Interview"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
